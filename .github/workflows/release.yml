name: Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count HEAD)
            echo "name=v1.0.${COUNT}" >> $GITHUB_OUTPUT
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/womi-release.jks"
          cat > "${{ github.workspace }}/keystore.properties" <<EOF
          storeFile=${{ github.workspace }}/womi-release.jks
          storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_CLIENT_SECRET: ${{ secrets.MAL_CLIENT_SECRET }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate & rename APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEST="${{ github.workspace }}/watashiwomite-${{ steps.tag.outputs.name }}.apk"
          mv "$APK" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT
          echo "name=watashiwomite-${{ steps.tag.outputs.name }}.apk" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" | grep -v "^Merge " || true)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" | grep -v "^Merge " | grep -v "^Co-authored" || true)
          fi

          FEATS=$(echo "$COMMITS" | grep -E "^feat(\(.+\))?:" | sed 's/^feat[^:]*: //' || true)
          FIXES=$(echo "$COMMITS" | grep -E "^fix(\(.+\))?:" | sed 's/^fix[^:]*: //' || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^feat|^fix|^chore|^ci|^docs|^style|^refactor|^test" | grep -v "^$" || true)

          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}### ✨ What's new\n"
            while IFS= read -r line; do
              [ -n "$line" ] && BODY="${BODY}- ${line}\n"
            done <<< "$FEATS"
            BODY="${BODY}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### 🐛 Bug fixes\n"
            while IFS= read -r line; do
              [ -n "$line" ] && BODY="${BODY}- ${line}\n"
            done <<< "$FIXES"
            BODY="${BODY}\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}### 🔧 Other changes\n"
            while IFS= read -r line; do
              [ -n "$line" ] && BODY="${BODY}- ${line}\n"
            done <<< "$OTHER"
            BODY="${BODY}\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="No notable changes."
          fi

          printf "%b" "$BODY" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: watashiwomite ${{ steps.tag.outputs.name }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: ${{ steps.apk.outputs.path }}
